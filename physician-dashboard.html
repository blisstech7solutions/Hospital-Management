<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Physician Partner Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2966/2966483.png">

<style>

body{
background:#f8f9fa;
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
color:#333;
}

h5{
font-weight:600;
}

#addNewBtn{
background:linear-gradient(to right,#00c6ff,#0072ff);
border:none;
color:white;
font-weight:bold;
}

.table{
background:white;
border-radius:.5rem;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

.table th{
background:#007bff;
color:white;
text-align:center;
}

.table td{
text-align:center;
vertical-align:middle;
}

.badge-pending{background:#ffc107;color:black;}
.badge-completed{background:#28a745;}
.badge-cancelled{background:#dc3545;}

.modal-content{
border-radius:1rem;
}
.appointment-card{
background:white;
border-radius:12px;
padding:14px;
margin-bottom:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
font-size:14px;
}

.row-line{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

.row-line .label{
font-weight:500;
color:#555;
}

.row-line .value{
font-weight:600;
}

.card-actions{
display:flex;
gap:6px;
margin-top:10px;
}

.card-actions button{
flex:1;
}

@media (max-width:768px){

.table{
font-size:13px;
}

th,td{
white-space:nowrap;
}

.btn{
padding:4px 8px;
font-size:12px;
}

}
.appointments-toolbar{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;
}

.left-section{
display:flex;
align-items:center;
gap:20px;
flex-wrap:wrap;
}

.title{
margin:0;
font-weight:600;
}

.date-filter{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.date-filter input{
max-width:180px;
}

.right-section{
display:flex;
gap:10px;
flex-wrap:wrap;
}

@media (max-width:768px){

.appointments-toolbar{
flex-direction:column;
align-items:flex-start;
}

.date-filter{
width:100%;
}

.right-section{
width:100%;
}

.right-section button{
flex:1;
}

}
.date-filter input{
width:160px;
}

</style>

</head>

<body class="container py-4">
<div class="dashboard-header mb-3"
style="display:flex;justify-content:space-between;align-items:center;background:white;padding:10px 15px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.08);flex-wrap:wrap;gap:10px;">

  <div>
    <strong>Hospital:</strong>
    <span id="headerHospitalName">N/A</span><br>

    <strong>Email:</strong>
    <span id="headerHospitalEmail">N/A</span>
  </div>

  <div class="text-end">
    <strong>Doctor:</strong>
    <span id="headerDoctorName">N/A</span><br>

    <strong>Specialty:</strong>
    <span id="headerDoctorSpecialty">N/A</span>
  </div>

</div>
<div class="appointments-toolbar">

<div class="left-section">

<h5 class="title">Today's Appointments</h5>

<div class="date-filter">

<input type="date" id="filterDate" class="form-control">

<button class="btn btn-outline-primary" onclick="filterByDate()">
Filter
</button>

<button class="btn btn-outline-secondary" onclick="loadTodayAppointments()">
Today
</button>

</div>

</div>

<div class="right-section">

<button class="btn btn-success"
onclick="window.location.href='collection.html'">
💰 Money Collection
</button>

<button class="btn"
id="addNewBtn"
data-bs-toggle="modal"
data-bs-target="#addAppointmentModal">
+ Add Appointment
</button>

<button class="btn btn-outline-secondary"
onclick="logout()">
Logout
</button>

</div>

</div>

<div class="search-bar-container mt-3 mb-3">
  <input type="text"
id="searchPatient"
class="form-control"
placeholder="Search by mobile or name">
</div>

<div class="table-responsive d-none d-md-block">

<table class="table table-bordered">

<thead>

<tr>

<th>PRN</th>
<th>Patient Name</th>
<th>Mobile</th>
<th>Age</th>
<th>Gender</th>
<th>Status</th>
<th>Fee</th>
<th>Paid</th>
<th>Action</th>

</tr>

</thead>

<tbody id="appointmentBody"></tbody>

</table>

</div>

<!-- MOBILE CARD VIEW -->

<div id="appointmentCards" class="d-md-none"></div>

<!-- ADD EDIT MODAL -->

<div class="modal fade"
id="addAppointmentModal"
tabindex="-1">

<div class="modal-dialog modal-dialog-centered">

<form id="addAppointmentForm"
class="modal-content"
novalidate>

<div class="modal-header">

<h5 class="modal-title"
id="addAppointmentLabel">
Add Appointment
</h5>

<button type="button"
class="btn-close"
data-bs-dismiss="modal"> </button>

</div>

<div class="modal-body">

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Patient Name</label>
<input id="patientName"
class="form-control"
required>
</div>

<div class="col-md-6">
<label class="form-label">Mobile</label>
<input id="mobile"
class="form-control"
required
pattern="[0-9]{10}">
</div>
<div class="col-md-6">
<label class="form-label">Appointment Date</label>
<input id="appointmentDate" type="date" class="form-control">
</div>
<div class="col-md-3">
<label class="form-label">Age</label>
<input id="age"
type="number"
class="form-control">
</div>

<div class="col-md-3">
<label class="form-label">Gender</label>
<select id="gender"
class="form-select">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>
</div>

<div class="col-md-6">
<label class="form-label">Symptoms</label>
<textarea id="symptoms"
class="form-control"></textarea>
</div>

<div class="col-md-4">
<label class="form-label">Consultation Fee</label>
<input id="fee"
type="number"
class="form-control">
</div>

<div class="col-md-4">
<label class="form-label">Payment Mode</label>
<select id="paymentMode"
class="form-select">
<option>Cash</option>
<option>UPI</option>
<option>Card</option>
</select>
</div>

<div class="col-md-4">
<label class="form-label">Status</label>
<select id="status"
class="form-select">
<option value="Pending">Pending</option>
<option value="completed">Completed</option>
<option value="Cancelled">Cancelled</option>
</select>
</div>

<div class="col-12">
<div class="form-check mt-2">
<input type="checkbox"
id="feePaid"
class="form-check-input">
<label class="form-check-label">
Fee Paid
</label>
</div>
</div>

</div>
</div>

<div class="modal-footer">

<button type="submit"
class="btn btn-primary"
id="saveBtn">
Save Appointment </button>

<button type="button"
class="btn btn-secondary"
data-bs-dismiss="modal">
Cancel </button>

</div>

</form>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

const firebaseConfig={
apiKey:"AIzaSyA-e5UveE8KsNuT-d6pYzdYFop3VoTomwk",
authDomain:"hospital-management-syst-580a4.firebaseapp.com",
projectId:"hospital-management-syst-580a4",
storageBucket:"hospital-management-syst-580a4.appspot.com",
messagingSenderId:"318105236795",
appId:"1:318105236795:web:548c0e174553eeed67f31e"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();

let hospitalId,currentUser,linkedProviderEmail;
let editMode=false,editDocId=null;

const appointmentBody=document.getElementById("appointmentBody");
const searchInput=document.getElementById("searchPatient");
const addAppointmentForm=document.getElementById("addAppointmentForm");

const patientName=document.getElementById("patientName");
const mobile=document.getElementById("mobile");
const age=document.getElementById("age");
const gender=document.getElementById("gender");
const symptoms=document.getElementById("symptoms");
const fee=document.getElementById("fee");
const paymentMode=document.getElementById("paymentMode");
const status=document.getElementById("status");
const feePaid=document.getElementById("feePaid");

const addAppointmentModal = new bootstrap.Modal(
document.getElementById("addAppointmentModal")
);
document.getElementById("addAppointmentModal")
.addEventListener("shown.bs.modal", () => {

const today = new Date();
const istDate = new Date(
today.getFullYear(),
today.getMonth(),
today.getDate()
);

document.getElementById("appointmentDate").value =
istDate.toLocaleDateString("en-CA");

});



auth.onAuthStateChanged(async user=>{

if(!user){
location.href="login.html";
return;
}

currentUser=user;

const userDoc=await db.collection("users")
.doc(user.uid)
.get();

linkedProviderEmail=userDoc.data()?.linkedProviderEmail;
const today = new Date();

const istDate = new Date(
today.getFullYear(),
today.getMonth(),
today.getDate()
);

document.getElementById("filterDate").value =
istDate.toLocaleDateString("en-CA");
const hospitalSnap=await db.collection("hospitals")
.where("providerEmail","==",linkedProviderEmail)
.limit(1)
.get();

if(!hospitalSnap.empty){

hospitalId = hospitalSnap.docs[0].id;   // ⭐ THIS WAS MISSING
window.hospitalId = hospitalId;
const hospitalData = hospitalSnap.docs[0].data();

document.getElementById("headerHospitalName").textContent =
hospitalData.hospitalName || "N/A";

document.getElementById("headerHospitalEmail").textContent =
hospitalData.hospitalEmail || "N/A";

document.getElementById("headerDoctorName").textContent =
hospitalData.doctorName || "N/A";

document.getElementById("headerDoctorSpecialty").textContent =
hospitalData.doctorSpecialty || "N/A";

loadTodayAppointments();

}
else{
alert("No hospital linked.");
}

});

function filterByDate(){

const selectedDate =
document.getElementById("filterDate").value;

if(!selectedDate) return;

const start = new Date(selectedDate);
start.setHours(0,0,0,0);

const end = new Date(start);
end.setDate(start.getDate()+1);

const startTS = firebase.firestore.Timestamp.fromDate(start);
const endTS = firebase.firestore.Timestamp.fromDate(end);

db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.where("date", ">=", startTS)
.where("date", "<", endTS)
.get()
.then(snapshot => {
renderAppointments(snapshot.docs);
});

}
function loadTodayAppointments(){

const today = new Date();
today.setHours(0,0,0,0);

const tomorrow = new Date(today);
tomorrow.setDate(today.getDate()+1);

const start = firebase.firestore.Timestamp.fromDate(today);
const end = firebase.firestore.Timestamp.fromDate(tomorrow);

db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.where("date", ">=", start)
.where("date", "<", end)
.onSnapshot(snapshot => renderAppointments(snapshot.docs));

}



function renderAppointments(docs){

appointmentBody.innerHTML="";
appointmentCards.innerHTML="";
if(docs.length === 0){

appointmentBody.innerHTML = `
<tr>
<td colspan="9" class="text-center text-muted py-4">
No appointments found for selected date
</td>
</tr>
`;

appointmentCards.innerHTML = `
<div class="text-center text-muted mt-4">
No appointments found for selected date
</div>
`;

return;
}
docs.forEach(doc=>{

const d=doc.data();

let statusClass =
d.status==="completed"
?"badge-completed"
:"badge-pending";

/* -------- TABLE ROW -------- */

appointmentBody.innerHTML+=`

<tr data-status="${d.status}">

<td>${d.prn||""}</td>

<td>${d.patientName}</td>

<td>${d.mobile}</td>

<td>${d.age||""}</td>

<td>${d.gender||""}</td>

<td>
<span class="badge ${statusClass}">
${d.status}
</span>
</td>

<td>${d.fee||""}</td>

<td>${d.feePaid?"Yes":"No"}</td>

<td>

<button class="btn btn-sm btn-primary"
onclick="editAppointment('${doc.id}')">
Edit
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteAppointment('${doc.id}')">
Delete
</button>

</td>

</tr>
`;

/* -------- MOBILE CARD -------- */

appointmentCards.innerHTML+=`

<div class="appointment-card">

<div class="row-line">
<span class="label">PRN</span>
<span class="value">${d.prn||""}</span>
</div>

<div class="row-line">
<span class="label">Patient</span>
<span class="value">${d.patientName}</span>
</div>

<div class="row-line">
<span class="label">Mobile</span>
<span>${d.mobile}</span>
</div>

<div class="row-line">
<span class="label">Age / Gender</span>
<span>${d.age||""} / ${d.gender||""}</span>
</div>

<div class="row-line">
<span class="label">Status</span>
<span class="badge ${statusClass}">
${d.status}
</span>
</div>

<div class="row-line">
<span class="label">Fee</span>
<span>₹${d.fee||""}</span>
</div>

<div class="row-line">
<span class="label">Fee Paid</span>
<span>${d.feePaid?"Yes":"No"}</span>
</div>

<div class="card-actions">

<button class="btn btn-sm btn-primary"
onclick="editAppointment('${doc.id}')">
Edit
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteAppointment('${doc.id}')">
Delete
</button>

</div>

</div>
`;

});

}

searchInput.addEventListener("input",()=>{

const val=searchInput.value.toLowerCase();

document.querySelectorAll("#appointmentBody tr")
.forEach(row=>{

const name=row.cells[1].textContent.toLowerCase();
const mob=row.cells[2].textContent.toLowerCase();

row.style.display=
(name.includes(val)||mob.includes(val))
?"":"none";

});

});

async function generatePRN() {

const today = new Date();

const dateKey =
today.getFullYear().toString().slice(-2) +
String(today.getMonth() + 1).padStart(2, '0') +
String(today.getDate()).padStart(2, '0');

// Example: 240317

const ref = db.collection("hospitals")
.doc(hospitalId)
.collection("meta")
.doc("prn_" + dateKey);

return await db.runTransaction(async (t) => {

const doc = await t.get(ref);

let count = 1;

if (doc.exists) {
count = doc.data().count + 1;
}

t.set(ref, { count }, { merge: true });

return `PRN${dateKey}${String(count).padStart(3,'0')}`;

// Example: PRN240317001

});

}

addAppointmentForm.addEventListener("submit",
async e=>{

e.preventDefault();
if (!patientName.value.trim()) {
alert("Patient name required");
return;
}

if (!/^[0-9]{10}$/.test(mobile.value.trim())) {
alert("Enter valid 10 digit mobile");
return;
}
const selectedDateValue =
document.getElementById("appointmentDate").value;

const selectedDate = selectedDateValue
? new Date(selectedDateValue)
: new Date();
const istDate = new Date(
selectedDate.getFullYear(),
selectedDate.getMonth(),
selectedDate.getDate(),
12, 0, 0
);
const data={

patientName:patientName.value.trim(),
mobile:mobile.value.trim(),
age:age.value,
gender:gender.value,
symptoms:symptoms.value,
fee: Number(fee.value) || 0,
paymentMode:paymentMode.value,
status:status.value,
feePaid:feePaid.checked,


date: firebase.firestore.Timestamp.fromDate(istDate)
};

try{

if(editMode){

await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.doc(editDocId)
.update(data);

}else{


const prn = await generatePRN();
await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.add({
...data,
prn: prn
});

}

resetForm();
addAppointmentModal.hide();

}catch(err){

alert(err.message);

}

});



async function editAppointment(id){

const doc=await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.doc(id)
.get();

const d=doc.data();

patientName.value=d.patientName;
mobile.value=d.mobile;
age.value=d.age;
gender.value=d.gender;
symptoms.value=d.symptoms;
fee.value=d.fee;
paymentMode.value=d.paymentMode;
status.value=d.status;
feePaid.checked=d.feePaid;

editMode=true;
editDocId=id;

addAppointmentModal.show();

}


async function deleteAppointment(id){

if(confirm("Delete?")){

await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.doc(id)
.delete();

}

}



function resetForm(){

addAppointmentForm.reset();
editMode=false;
editDocId=null;

}



function logout(){

auth.signOut().then(()=>{
window.location.href="login.html";
});

}

</script>
