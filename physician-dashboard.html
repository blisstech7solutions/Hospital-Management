function loadAppointmentsByDate(selectedDate) {

  if (!selectedDate) return;

  // 🔥 STOP previous listener
  if (unsubscribe) {
    unsubscribe();
    unsubscribe = null;
  }

  // 🔥 CLEAR UI immediately (prevents old data flash)
  appointmentBody.innerHTML = "";
  appointmentCards.innerHTML = "";

  // 🔥 Destroy DataTable safely
  if ($.fn.DataTable.isDataTable('#appointmentTable')) {
    $('#appointmentTable').DataTable().clear().destroy();
  }

  const [year, month, day] = selectedDate.split("-").map(Number);

  const start = new Date(year, month - 1, day, 0, 0, 0);
  const end = new Date(year, month - 1, day + 1, 0, 0, 0);

  const startTS = firebase.firestore.Timestamp.fromDate(start);
  const endTS = firebase.firestore.Timestamp.fromDate(end);

  unsubscribe = db.collection("hospitals")
    .doc(hospitalId)
    .collection("appointments")
    .where("date", ">=", startTS)
    .where("date", "<", endTS)
    .onSnapshot(snapshot => {
      renderAppointments(snapshot.docs);
    });
}
function updateButtonText() {
  themeToggle.textContent =

    ordering: true,
    info: true,
    responsive: true,
    pageLength: 10,
    language: {
      search: "🔍 Search:",
      lengthMenu: "Show _MENU_ entries",
    }
  });
}
function filterByDate() {
  const selectedDate = document.getElementById("filterDate").value;
  loadAppointmentsByDate(selectedDate);
}


function renderAppointments(docs){

appointmentBody.innerHTML="";
appointmentCards.innerHTML="";

appointmentBody.innerHTML = `

`;

appointmentCards.innerHTML = `

`;

}
docs.forEach(doc=>{

d.status==="completed"

?"badge-cancelled"

/* -------- TABLE ROW -------- */

appointmentBody.innerHTML+=`

${d.status}
</span>
</td>

<td>

Edit
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteAppointment('${doc.id}')">
Delete
</button>

</td>

</tr>
`;

/* -------- MOBILE CARD -------- */

appointmentCards.innerHTML+=`

<div class="appointment-card">

<div class="row-line">
<span class="label">PRN</span>
<span class="value">${d.prn||""}</span>
</div>

<div class="row-line">
<span class="label">Patient</span>
<span class="value">${d.patientName}</span>
</div>

<div class="row-line">
<span class="label">Mobile</span>
<span>${d.mobile}</span>
</div>

<div class="row-line">
<span class="label">Age / Gender</span>
<span>${d.age||""} / ${d.gender||""}</span>
</div>

<div class="row-line">
<span class="label">Status</span>
<span class="badge ${statusClass}">
${d.status}
</span>
</div>

<div class="row-line">
<span class="label">Fee</span>
<span>₹${d.fee||""}</span>
</div>

<div class="row-line">
<span class="label">Fee Paid</span>
<span>${d.feePaid?"Yes":"No"}</span>
</div>

<div class="card-actions">

<button class="btn btn-sm btn-primary"
onclick="editAppointment('${doc.id}')">
Edit
</button>

<button class="btn btn-sm btn-danger"
onclick="deleteAppointment('${doc.id}')">

</button>

`;

});
if (docs.length > 0) {

}


async function generatePRN() {

const today = new Date();

const dateKey =
today.getFullYear().toString().slice(-2) +
String(today.getMonth() + 1).padStart(2, '0') +
String(today.getDate()).padStart(2, '0');

// Example: 240317

const ref = db.collection("hospitals")
.doc(hospitalId)
.collection("meta")
.doc("prn_" + dateKey);

return await db.runTransaction(async (t) => {

const doc = await t.get(ref);

let count = 1;

if (doc.exists) {
count = doc.data().count + 1;
}

t.set(ref, { count }, { merge: true });

return `PRN${dateKey}${String(count).padStart(3,'0')}`;

// Example: PRN240317001

});

}

addAppointmentForm.addEventListener("submit",
async e=>{

const selectedDate = selectedDateValue

: new Date();

selectedDate.getMonth(),
selectedDate.getDate(),
12, 0, 0
);

mobile:mobile.value.trim(),

const prn = await generatePRN();

});

}catch(err){

}

});



async function editAppointment(id){

const doc=await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.doc(id)

const d=doc.data();

patientName.value=d.patientName;
mobile.value=d.mobile;
age.value=d.age;
gender.value=d.gender;
symptoms.value=d.symptoms;
fee.value=d.fee;
paymentMode.value=d.paymentMode;
status.value=d.status;
feePaid.checked=d.feePaid;

editMode=true;
editDocId=id;

addAppointmentModal.show();

}


async function deleteAppointment(id){

await db.collection("hospitals")
.doc(hospitalId)
.collection("appointments")
.doc(id)

}



function resetForm(){
