<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Care Connect</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* MAIN LAYOUT */
.main{
  display:flex;
  height:100vh;
}

.left{
  flex:1;
  background:url('https://images.unsplash.com/photo-1576091160550-2173dba999ef?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
  position:relative;
}

.left::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,120,255,0.35),rgba(0,0,0,0.85));
}

/* RIGHT LOGIN */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* LOGIN BOX */
.login-container{
  width:100%;
  max-width:380px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:14px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BRAND */
.brand{
  text-align:center;
  margin-bottom:20px;
}

.brand h2{
  margin:0;
  color:#ff3c6f;
}

.brand p{
  font-size:12px;
  color:#aaa;
}

/* TITLE */
.title{
  text-align:center;
  margin-bottom:20px;
}

.title p{
  font-size:13px;
  color:#aaa;
}

/* INPUT */
.input-group{
  margin-bottom:15px;
  position:relative;
}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

input:focus{
  outline:none;
  border-color:#00e5ff;
}

/* PASSWORD TOGGLE */
#toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#aaa;
}

/* BUTTON */
.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#ff3c6f,#00e5ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* SECONDARY */
.secondary-btn{
  width:100%;
  margin-top:10px;
  padding:10px;
  border-radius:25px;
  border:1px solid #333;
  background:transparent;
  color:#aaa;
}

/* LINKS */
.links{
  text-align:center;
  margin-top:15px;
  font-size:13px;
}

.links a{
  color:#00e5ff;
  text-decoration:none;
}

/* LOADER */
#loader{
  display:none;
  text-align:center;
  font-size:13px;
  color:#aaa;
}

/* MOBILE */
@media(max-width:768px){
  .left{
    display:none;
  }
  .right{
    flex:1;
  }
}
</style>
</head>

<body>

<div class="main">

  <!-- LEFT IMAGE -->
  <div class="left"></div>

  <!-- RIGHT LOGIN -->
  <div class="right">

    <div class="login-container">

      <div class="brand">
        <h2>CARE CONNECT</h2>
        <p>Bliss Tech7 Solutions</p>
      </div>

      <div class="title">
        <h3>Sign in</h3>
        <p>Access your dashboard</p>
      </div>

      <form id="login-form">

        <div class="input-group">
          <input type="email" id="email" placeholder="Email address" required>
        </div>

        <div class="input-group">
          <input type="password" id="password" placeholder="Password" required>
          <span id="toggle-password">Show</span>
        </div>

        <div id="loader">Please wait...</div>

        <button type="submit" class="login-btn">Login</button>

        <button type="button" id="forgot-btn" class="secondary-btn">
          Forgot Password
        </button>

        <div class="links">
          <p>Don't have an account? <a href="signup.html">Create account</a></p>
        </div>

      </form>

    </div>

  </div>

</div>

<!-- Firebase (UNCHANGED) -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA-e5UveE8KsNuT-d6pYzdYFop3VoTomwk",
  authDomain: "hospital-management-syst-580a4.firebaseapp.com",
  projectId: "hospital-management-syst-580a4",
  storageBucket: "hospital-management-syst-580a4.appspot.com",
  messagingSenderId: "318105236795",
  appId: "1:318105236795:web:548c0e174553eeed67f31e"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

document.addEventListener("DOMContentLoaded", () => {
  const form = document.getElementById("login-form");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const togglePassword = document.getElementById("toggle-password");
  const loader = document.getElementById("loader");

  togglePassword.onclick = () => {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      togglePassword.textContent = "Hide";
    } else {
      passwordInput.type = "password";
      togglePassword.textContent = "Show";
    }
  };

  form.onsubmit = async (e) => {
    e.preventDefault();
    loader.style.display = "block";
    try {
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;

      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const uid = userCredential.user.uid;

      if (email === "vaibhavmalbhage@gmail.com") {
        window.location.href = "admin-dashboard.html";
        return;
      }

      const doc = await db.collection("users").doc(uid).get();
      if (!doc.exists) return alert("User data not found.");

      const userData = doc.data();

      if (!userData.isApproved) {
        alert("Your account is not approved yet.");
        return;
      }

      if (userData.role === "provider") {
        window.location.href = "provider-dashboard.html";
      } else if (userData.role === "physician") {
        window.location.href = "physician-dashboard.html";
      } else {
        alert("Unknown role. Contact admin.");
      }

    } catch (error) {
      alert("Error: " + error.message);
    } finally {
      loader.style.display = "none";
    }
  };

  document.getElementById("forgot-btn").onclick = async () => {
    if (!emailInput.value) return alert("Enter your email to reset password.");

    try {
      await auth.sendPasswordResetEmail(emailInput.value.trim());
      alert("Password reset email sent.");
    } catch (err) {
      alert("Error: " + err.message);
    }
  };
});
</script>

</body>
</html>
