<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Care Connect</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* LAYOUT */
.main{
  display:flex;
  height:100vh;
}

/* LEFT IMAGE (DIFFERENT IMAGE) */
.left{
  flex:1;
  background:url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
  position:relative;
}

.left::after{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom,rgba(0,0,0,0.5),rgba(0,0,0,0.9));
}

/* RIGHT FORM */
.right{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* FORM BOX */
.container{
  width:100%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(12px);
  border-radius:14px;
  padding:30px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* BRAND */
.brand{
  text-align:center;
  margin-bottom:20px;
}

.brand h2{
  margin:0;
  color:#ff3c6f;
}

.brand p{
  font-size:12px;
  color:#aaa;
}

/* TITLE */
.title{
  text-align:center;
  margin-bottom:20px;
}

.title p{
  font-size:13px;
  color:#aaa;
}

/* INPUT */
label{
  font-size:13px;
  margin-bottom:5px;
  display:block;
}

input, select{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #333;
  background:#111;
  color:#fff;
  margin-bottom:12px;
}

input:focus, select:focus{
  outline:none;
  border-color:#00e5ff;
}

/* PASSWORD TOGGLE */
.password-wrapper{
  position:relative;
}

#toggle-password{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#aaa;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:25px;
  background:linear-gradient(90deg,#ff3c6f,#00e5ff);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* LOADER */
#loader{
  text-align:center;
  font-size:13px;
  color:#aaa;
}

/* LINK */
p{
  text-align:center;
  font-size:13px;
}

a{
  color:#00e5ff;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .left{
    display:none;
  }
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA-e5UveE8KsNuT-d6pYzdYFop3VoTomwk",
  authDomain: "hospital-management-syst-580a4.firebaseapp.com",
  projectId: "hospital-management-syst-580a4",
  storageBucket: "hospital-management-syst-580a4.appspot.com",
  messagingSenderId: "318105236795",
  appId: "1:318105236795:web:548c0e174553eeed67f31e"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
</script>

<script defer>
document.addEventListener("DOMContentLoaded", () => {
  const auth = firebase.auth();
  const db = firebase.firestore();

  const form = document.getElementById("signup-form");
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const role = document.getElementById("role");
  const providerEmailSection = document.getElementById("provider-email-section");
  const providerEmailInput = document.getElementById("providerEmail");
  const togglePassword = document.getElementById("toggle-password");
  const loader = document.getElementById("loader");

  togglePassword.onclick = () => {
    if (password.type === "password") {
      password.type = "text";
      togglePassword.textContent = "Hide";
    } else {
      password.type = "password";
      togglePassword.textContent = "Show";
    }
  };

  role.addEventListener("change", () => {
    providerEmailSection.style.display = role.value === "physician" ? "block" : "none";
    if (role.value !== "physician") providerEmailInput.value = "";
  });

  form.onsubmit = async (e) => {
    e.preventDefault();

    if (!role.value) return alert("Please select a role.");
    if (password.value.length < 6) return alert("Password must be at least 6 characters long.");

    loader.style.display = "block";

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email.value.trim(), password.value);
      const uid = userCredential.user.uid;

      let userData = {
        email: email.value.trim(),
        role: role.value,
        isApproved: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      };

      if (role.value === "physician") {
        const providerEmail = providerEmailInput.value.trim();
        if (!providerEmail) throw new Error("Please enter the provider's email.");

        const providerSnap = await db.collection("users")
          .where("email", "==", providerEmail)
          .where("role", "==", "provider")
          .limit(1).get();

        if (providerSnap.empty) throw new Error("No registered provider found with that email.");

        const providerUID = providerSnap.docs[0].id;
        userData.linkedProviderEmail = providerEmail;
        userData.linkedProviderUID = providerUID;
        userData.appointmentsEmail = providerEmail;
      } else {
        userData.appointmentsEmail = email.value.trim();
      }

      await db.collection("users").doc(uid).set(userData);

      alert("Signup successful! Awaiting admin approval.");
      form.reset();
      providerEmailSection.style.display = "none";

    } catch (err) {
      alert("Error: " + err.message);
    } finally {
      loader.style.display = "none";
    }
  };
});
</script>
</head>

<body>

<div class="main">

  <!-- IMAGE SIDE -->
  <div class="left"></div>

  <!-- FORM SIDE -->
  <div class="right">

    <div class="container">

      <div class="brand">
        <h2>CARE CONNECT</h2>
        <p>Bliss Tech7 Solutions</p>
      </div>

      <div class="title">
        <h3>Create Account</h3>
        <p>Join the healthcare network</p>
      </div>

      <form id="signup-form">

        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email" required>

        <label>Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter password" required>
          <span id="toggle-password">Show</span>
        </div>

        <label>Select Role</label>
        <select id="role" required>
          <option value="" disabled selected>Select Role</option>
          <option value="provider">Provider</option>
          <option value="physician">Physician Partner</option>
        </select>

        <div id="provider-email-section" style="display:none;">
          <label>Provider Email</label>
          <input type="email" id="providerEmail" placeholder="Enter provider email">
        </div>

        <div id="loader">Please wait...</div>

        <button type="submit">Sign Up</button>

        <p>Already have an account? <a href="login.html">Login</a></p>

      </form>

    </div>

  </div>

</div>

</body>
</html>
